name: Deploy 3D Printer

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - run: npm install -g firebase-tools

      - run: firebase deploy --only hosting --project edubaling3dprinter --token ${{ secrets.FIREBASE_TOKEN }}
